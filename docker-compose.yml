services:
  kb_builder:
    build: .
    depends_on:
      redis:
        condition: service_healthy
      tei:
        condition: service_healthy
    env_file: .env
    environment:
      - KV_STORAGE=RedisKVStorage
      - VECTOR_STORAGE=QdrantVectorDBStorage
      - GRAPH_STORAGE=Neo4JStorage
      - REDIS_URI=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - EMBEDDING_BINDING_HOST=http://tei:8080/v1
    volumes:
      - ./data:/app/data
    command: ["python", "scripts/kb_builder.py"]

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cuda-1.6
    restart: unless-stopped
    runtime: nvidia
    environment:
      - HF_HOME=/data
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 240s
    command: ["--model-id", "${EMBEDDING_MODEL:-BAAI/bge-m3}", "--port", "8080"]
    volumes:
      - tei_data:/data

  redis:
    image: redis:alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:latest
    restart: always
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  app:
    build: .
    env_file: .env
    restart: unless-stopped
    environment:
      - EMBEDDING_BINDING_HOST=http://tei:8080/v1
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data
    ports:
      - "${PORT}:8080"
    depends_on:
      redis:
        condition: service_healthy
      tei:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
    # Entrypoint will start Streamlit (checks dependencies)
    command: ["bash", "/app/entrypoint.sh"]

volumes:
  redis_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  tei_data: