services:
  kb_builder:
    build:
      context: .
      dockerfile: dockerfile.backend
    depends_on:
      redis:
        condition: service_healthy
      tei:
        condition: service_healthy
    env_file: .env
    environment:
      - KV_STORAGE=RedisKVStorage
      - VECTOR_STORAGE=QdrantVectorDBStorage
      - GRAPH_STORAGE=Neo4JStorage
      - REDIS_URI=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - EMBEDDING_BINDING_HOST=http://tei:8080/v1
    volumes:
      - ./data:/app/data
    command: ["python", "scripts/kb_builder.py"]
    profiles:
      - kb

  tei:
    image: ghcr.io/huggingface/text-embeddings-inference:cuda-1.6
    restart: unless-stopped
    runtime: nvidia
    environment:
      - HF_HOME=/data
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 240s
    command: ["--model-id", "${EMBEDDING_MODEL:-BAAI/bge-m3}", "--port", "8080"]
    volumes:
      - tei_data:/data

  redis:
    image: redis:alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-chatbot}
      - POSTGRES_USER=${POSTGRES_USER:-chatbot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-chatbot}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbot} -d ${POSTGRES_DB:-chatbot}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    image: neo4j:latest
    restart: always
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs

  # Backend API - FastAPI service exposing chatbot functionality
  backend:
    build:
      context: .
      dockerfile: dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      - KV_STORAGE=RedisKVStorage
      - VECTOR_STORAGE=QdrantVectorDBStorage
      - GRAPH_STORAGE=Neo4JStorage
      - REDIS_URI=redis://redis:6379/0
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://chatbot:chatbot@postgres:5432/chatbot}
      - CHAT_CACHE_REDIS_URL=${CHAT_CACHE_REDIS_URL:-redis://redis:6379/1}
      - CHAT_CACHE_TTL_SECONDS=${CHAT_CACHE_TTL_SECONDS:-300}
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - EMBEDDING_BINDING_HOST=http://tei:8080/v1
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      tei:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # UI - React frontend
  ui:
    build:
      context: .
      dockerfile: dockerfile.ui
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
        - VITE_REQUEST_TIMEOUT_MS=${VITE_REQUEST_TIMEOUT_MS:-60000}
    restart: unless-stopped
    env_file: .env
    ports:
      - "${UI_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # DEPRECATED: Old monolithic app container - kept for reference, remove if not needed
  app:
    build: .
    env_file: .env
    restart: unless-stopped
    environment:
      - EMBEDDING_BINDING_HOST=http://tei:8080/v1
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      redis:
        condition: service_healthy
      tei:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_started
    # Entrypoint will start Streamlit (checks dependencies)
    command: ["bash", "/app/entrypoint.sh"]
    profiles:
      - legacy  # Only start this with --profile legacy

volumes:
  redis_data:
  postgres_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  tei_data: