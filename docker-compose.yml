services:
  kb_builder:
    build:
      context: .
      dockerfile: dockerfile.backend
    depends_on:
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      - EMBEDDING_BINDING_HOST=${OPENROUTER_BASE_URL:-https://openrouter.ai/api}
      - EMBEDDING_API_KEY=${OPENROUTER_API_KEY}
      - EMBEDDING_PRIMARY_RETRIES=5
      - EMBEDDING_FALLBACK_RETRIES=2
    volumes:
      - ./data:/app/data
    command: ["python", "backend/scripts/kb_builder.py"]
    profiles:
      - kb

  redis:
    image: redis:alpine
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-chatbot}
      - POSTGRES_USER=${POSTGRES_USER:-chatbot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-chatbot}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatbot} -d ${POSTGRES_DB:-chatbot}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Backend API - FastAPI service exposing chatbot functionality
  backend:
    build:
      context: .
      dockerfile: dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://chatbot:chatbot@postgres:5432/chatbot}
      - CHAT_CACHE_REDIS_URL=${CHAT_CACHE_REDIS_URL:-redis://redis:6379/1}
      - CHAT_CACHE_TTL_SECONDS=${CHAT_CACHE_TTL_SECONDS:-300}
      - DEV=${DEV:-true}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-local-jwt-secret-please-change-32-plus}
      - EMBEDDING_BINDING_HOST=${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      - EMBEDDING_API_KEY=${OPENROUTER_API_KEY}
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # UI - React frontend
  ui:
    build:
      context: .
      dockerfile: dockerfile.ui
      args:
        - VITE_API_URL=${VITE_API_URL:-/api}
        - VITE_REQUEST_TIMEOUT_MS=${VITE_REQUEST_TIMEOUT_MS:-60000}
    restart: unless-stopped
    env_file: .env
    ports:
      - "${UI_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  redis_data:
  postgres_data: