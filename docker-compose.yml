services:
  chatbot-diabetes:
    build: .
    container_name: health_chatbot_api
    depends_on:
      - redis
      - qdrant
      - neo4j
      - vllm
    env_file: .env
    environment:
      - REDIS_URI=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password
      - LLM_BINDING_HOST=http://vllm:8000
      - EMBEDDING_BINDING_HOST=http://vllm:8000
      - SOURCE_PDF=/app/data/raw/doc.pdf
      - RUN_SAMPLE_QUERIES=${RUN_SAMPLE_QUERIES:-}
      - PORT=8080
      - PYTHONUNBUFFERED=1
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - chatbot_network
    command: /app/entrypoint.sh

  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm_server
    restart: unless-stopped
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - HF_HOME=/root/.cache/huggingface
    ports:
      - "8000:8000"
    volumes:
      - vllm_cache:/root/.cache/huggingface
    networks:
      - chatbot_network
    # Specify the model to use - customize these based on your needs
    command: 
      - --model
      - meta-llama/Llama-3.2-3B-Instruct
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - "4096"
      - --gpu-memory-utilization
      - "0.9"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  redis:
    image: redis:alpine
    container_name: redis_storage
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - chatbot_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_storage
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - chatbot_network

  neo4j:
    image: neo4j:latest
    container_name: neo4j_storage
    restart: always
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - chatbot_network

networks:
  chatbot_network:
    driver: bridge

volumes:
  redis_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  vllm_cache: